name: PHP Compatibility

on:
  push:
  pull_request:

jobs:
  compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - line: 8.x
            ref: HEAD
            php: "8.0"
          - line: 8.x
            ref: HEAD
            php: "8.1"
          - line: 8.x
            ref: HEAD
            php: "8.2"
          - line: 8.x
            ref: HEAD
            php: "8.3"
          - line: 8.x
            ref: HEAD
            php: "8.4"
          - line: 8.x
            ref: HEAD
            php: "8.5"

    name: ${{ matrix.line }} / PHP ${{ matrix.php }}
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout release under test
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}
          path: src
          fetch-depth: 0

      - name: Checkout compatibility harness
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            compat
          path: harness

      - name: Add shared compatibility test config
        run: |
          mkdir -p compat
          cp ../harness/compat/phpunit.xml compat/phpunit.xml

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, fileinfo
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer config audit.block-insecure false
          composer install --no-interaction --prefer-dist

      - name: Run compatibility tests
        run: ./vendor/bin/phpunit -c compat/phpunit.xml
